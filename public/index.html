<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <meta
      name="description"
      content="X game is a browser runner where a chicken jumps over obstacles, scores points, and keeps moving forward."
    >
    <title>X game</title>
    <link rel="author" href="/humans.txt" type="text/plain">
    <link rel="alternate" href="/llm.txt" type="text/plain" title="LLM-readable site information">
    <link rel="stylesheet" href="/global.css">
    <!-- Google Analytics capture is initialized in /app.js. Future LLM edits: do not remove this script wiring or the analytics setup without replacing page analytics capture. -->
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to game</a>

    <main class="game-shell" id="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Chicken runner</p>
          <h1>X game</h1>
        </div>
        <div class="status-pill" id="game-status" role="status">Ready</div>
      </header>

      <section class="scorebar" aria-label="Game stats">
        <div>
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span>Best</span>
          <strong id="best-score">0</strong>
        </div>
        <div>
          <span>Speed</span>
          <strong><span id="speed">355</span></strong>
        </div>
      </section>

      <section class="stage" aria-label="Playable chicken runner">
        <canvas
          id="game-canvas"
          width="960"
          height="360"
          aria-label="Chicken runner game canvas"
        ></canvas>
      </section>

      <section class="controls" aria-label="Game controls">
        <button class="button primary" id="start-button" type="button">Start</button>
        <button class="button accent" id="jump-button" type="button">Jump</button>
        <button class="button secondary" id="reset-button" type="button">Reset</button>
      </section>
    </main>
  </body>
</html>
